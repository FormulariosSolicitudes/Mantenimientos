<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <title>Formulario dinámico</title>

  <style>
    body {
      font-family: 'Roboto', Arial, sans-serif;
      background-color: #f0ebf8;
      margin: 0;
      padding: 0;
    }

    form {
      background: #ffffff;
      max-width: 650px;
      margin: 40px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 3px 12px rgba(0, 0, 0, 0.1);
    }

    h2,
    h3 {
      color: #202124;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      margin-bottom: 18px;
      border: none;
      border-bottom: 2px solid #dadce0;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-bottom: 2px solid #673ab7;
    }

    .tipo-contenedor {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tipo-opcion {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    button {
      background-color: #673ab7;
      color: white;
      border: none;
      padding: 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .modal-content {
      background: #fff;
      width: 420px;
      max-height: 75%;
      overflow-y: auto;
      margin: 80px auto;
      padding: 20px;
      border-radius: 10px;
    }

    .opcion-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    #seleccionMostrada {
      font-size: 14px;
      color: #555;
      margin-top: 10px;
    }

    .login {
      text-align: center;
      margin-top: 20px;
    }

    .login a {
      background: #4285f4;
      color: white;
      padding: 10px 15px;
      border-radius: 5px;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <div class="login" id="loginBox">
    <a href="/auth/google">Login con Google</a>
    <a href="/auth/microsoft" style="background:#0078d4;">Login con Outlook</a>
    <p id="userInfo" style="display:none;"></p>
  </div>

  <h2 style="text-align:center;">Formulario de Solicitud</h2>

  <form id="miFormulario">

    <h3>Datos personales</h3>

    <input type="text" id="cedula" placeholder="Cédula" required>
    <input type="text" id="nombre" placeholder="Nombre" required>
    <input type="text" id="codigo_pv" placeholder="Código Punto de Venta">
    <input type="text" id="nombre_pv" placeholder="Nombre Punto de Venta">
    <input type="text" id="celular" placeholder="Celular">

    <h3>Tipo de solicitud</h3>

    <div class="tipo-contenedor">
      <label class="tipo-opcion">
        <input type="checkbox" id="locativo">
        <span>Locativo</span>
      </label>

      <label class="tipo-opcion">
        <input type="checkbox" id="mobiliario">
        <span>Mobiliario</span>
      </label>
    </div>

    <p id="seleccionMostrada">No has seleccionado opciones</p>

    <h3>Descripción de tu Caso</h3>
    <textarea id="descripcion" required placeholder="Describe tu caso..."></textarea>

    <button type="submit">Enviar</button>

  </form>

  <script>
    const locativo = document.getElementById("locativo");
    const mobiliario = document.getElementById("mobiliario");
    const textoSeleccion = document.getElementById("seleccionMostrada");
    const form = document.getElementById("miFormulario");
    const btn = form.querySelector("button");

    locativo.addEventListener("change", () => {
      if (locativo.checked) {
        abrirModal("modalLocativo");
        mobiliario.checked = false;
        mobiliario.disabled = true;
      } else {
        mobiliario.disabled = false;
      }
    });

    mobiliario.addEventListener("change", () => {
      if (mobiliario.checked) {
        abrirModal("modalMobiliario");
        locativo.checked = false;
        locativo.disabled = true;
      } else {
        locativo.disabled = false;
      }
    });

    function abrirModal(id) {
      document.getElementById(id).style.display = "block";
    }

    function cerrarModal(id) {
      document.getElementById(id).style.display = "none";
    }

    document.querySelectorAll("input[name='locativo_op']").forEach(el => {
      el.addEventListener("change", () => {
        cerrarModal("modalLocativo");
        actualizarTexto();
      });
    });

    document.querySelectorAll("input[name='mobiliario_op']").forEach(el => {
      el.addEventListener("change", () => {
        cerrarModal("modalMobiliario");
        actualizarTexto();
      });
    });

    function actualizarTexto() {
      const loc = [...document.querySelectorAll("input[name='locativo_op']:checked")]
        .map(el => el.value);

      const mob = [...document.querySelectorAll("input[name='mobiliario_op']:checked")]
        .map(el => el.value);

      let texto = "";

      if (loc.length) texto += "Locativo: " + loc.join(", ");
      if (mob.length) texto += (texto ? " | " : "") + "Mobiliario: " + mob.join(", ");

      textoSeleccion.textContent = texto || "No has seleccionado opciones";
    }

    // 🚀 ENVÍO OPTIMIZADO
    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      btn.disabled = true;
      btn.textContent = "Enviando...";

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), 10000); // 10 segundos

      const locativoSeleccionado = [...document.querySelectorAll("input[name='locativo_op']:checked")];
      const mobiliarioSeleccionado = [...document.querySelectorAll("input[name='mobiliario_op']:checked")];

      const datos = {
        cedula: document.getElementById("cedula").value,
        nombre: document.getElementById("nombre").value,
        codigo_pv: document.getElementById("codigo_pv").value,
        nombre_pv: document.getElementById("nombre_pv").value,
        celular: document.getElementById("celular").value,
        descripcion: document.getElementById("descripcion").value,
        locativo: document.getElementById("locativo").checked,
        mobiliario: document.getElementById("mobiliario").checked,
        locativo_opciones: locativoSeleccionado.map(el => el.value).join(", "),
        mobiliario_opciones: mobiliarioSeleccionado.map(el => el.value).join(", ")
      };

      try {
        const res = await fetch("/send", {
          method: "POST",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },

          body: JSON.stringify(datos),
          signal: controller.signal
        });

        const texto = await res.text();

        if (res.status === 401) {
          alert("⚠️ Debes iniciar sesión con Google");
        } else if (res.ok) {
          alert("✅ Enviado correctamente");
          form.reset();
          textoSeleccion.textContent = "No has seleccionado opciones";
        } else {
          alert("❌ " + texto);
        }

      } catch (error) {
        if (error.name === "AbortError") {
          alert("⏱️ El servidor tardó demasiado, intenta otra vez");
        } else {
          alert("❌ Error de conexión");
        }
      } finally {
        clearTimeout(timeout);
        btn.disabled = false;
        btn.textContent = "Enviar";
      }
    });

    // 🔐 Verificar sesión al cargar la página
    window.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("/me");
        const data = await res.json();

        const loginBox = document.getElementById("loginBox");
        const loginBtn = document.getElementById("loginBtn");
        const userInfo = document.getElementById("userInfo");

        if (data.logged) {
          // Ocultar botón de login
          loginBtn.style.display = "none";

          // Mostrar info del usuario
          userInfo.style.display = "block";
          userInfo.textContent = "Sesión iniciada como: " + data.email;
        }

      } catch (err) {
        console.error("Error verificando sesión:", err);
      }
    });
  </script>
